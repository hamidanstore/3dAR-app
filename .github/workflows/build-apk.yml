name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Siapkan Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/assets --save-dev
      - name: Siapkan Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Proses Platform dan Izin
        run: |
          # 1. Hapus folder lama jika ada untuk cegah bentrok
          rm -rf android
          
          # 2. Buat ulang folder android (Ini yang menciptakan file Manifest)
          npx cap add android
          
          # 3. Suntik izin (HANYA dijalankan setelah folder android ada)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-feature android:name="android.hardware.camera.ar" android:required="true" />' android/app/src/main/AndroidManifest.xml
          
          # 4. Generate Ikon dan Splash
          npx capacitor-assets generate --android
          
          # 5. Sinkronisasi akhir
          npx cap sync android
      - name: Build APK Android
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: Upload File APK
        uses: actions/upload-artifact@v4
        with:
          name: 3dAR-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Suntik Izin Android (Permissions)
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-feature android:name="android.hardware.camera.ar" android:required="true" />' android/app/src/main/AndroidManifest.xml
      - name: Generate Folder Android & Sinkronisasi
        run: |
          npx cap add android || true
          npx cap sync android
      - name: Build APK Android
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: Upload File APK
        uses: actions/upload-artifact@v4
        with:
          name: 3dAR-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk